<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Innovación | Gestión Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .priority-btn.active-high { background-color: #ef4444 !important; color: white !important; }
        .priority-btn.active-medium { background-color: #f59e0b !important; color: white !important; }
        .priority-btn.active-low { background-color: #10b981 !important; color: white !important; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Estilos para Drag & Drop */
        .draggable-card { cursor: grab; transition: transform 0.2s, box-shadow 0.2s; }
        .draggable-card:active { cursor: grabbing; transform: scale(1.02); }
        .trash-zone-active { background-color: #fee2e2 !important; border-color: #ef4444 !important; transform: scale(1.02); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-blue-50 min-h-screen flex flex-col">

    <div id="login-screen" class="fixed inset-0 z-[200] bg-slate-100 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-blue-100">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-3xl mx-auto mb-4">I</div>
                <h2 class="text-2xl font-extrabold text-slate-800">Acceso al Sistema</h2>
                <p class="text-slate-500 text-sm">Seleccione su perfil para continuar</p>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Tipo de Usuario</label>
                    <select id="user-role" onchange="togglePasswordField()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        <option value="general">Usuario General</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>

                <div id="password-field" class="hidden">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Contraseña</label>
                    <input type="password" id="login-pass" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="••••••••">
                </div>

                <button onclick="intentarLogin()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg transition-all transform active:scale-95">
                    Ingresar
                </button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex flex-col min-h-screen">
        <header class="bg-white shadow-sm border-b border-blue-100 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">I</div>
                    <span class="font-bold text-slate-800 text-lg hidden md:block">DEP. INVESTIGACIÓN APLICADA A LA INNOVACIÓN</span>
                </div>
                <nav class="flex space-x-1 items-center">
                    <button onclick="switchTab('registro')" id="tab-registro" class="px-4 py-2 rounded-lg font-medium text-sm transition-all bg-blue-50 text-blue-700">Registro</button>
                    <button onclick="switchTab('fichas')" id="tab-fichas" class="px-4 py-2 rounded-lg font-medium text-sm transition-all text-slate-600 hover:bg-slate-50">Fichas</button>
                    <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-4 py-2 rounded-lg font-medium text-sm transition-all text-slate-600 hover:bg-slate-50">Dashboard</button>
                    <button id="btn-logout" onclick="logout()" class="hidden ml-4 px-3 py-2 bg-red-50 text-red-600 rounded-lg font-bold text-xs hover:bg-red-100 transition-all">
                        CERRAR SESIÓN
                    </button>
                </nav>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-4 md:p-8 space-y-6 flex-grow w-full">
            <div id="registro-view" class="space-y-8 animate-fade-in max-w-4xl mx-auto">
                <div class="bg-white p-4 rounded-2xl shadow-lg border border-blue-100 flex flex-col md:flex-row gap-4 items-center">
                    <div class="flex-1 w-full">
                        <label for="busquedaCedula" class="text-xs font-bold text-slate-500 uppercase ml-2">Consultar Registro por Cédula</label>
                        <div class="relative">
                            <input type="text" id="busquedaCedula" placeholder="000-0000000-0" class="w-full pl-4 pr-12 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-mono shadow-sm">
                            <button onclick="buscarPorCedula()" class="absolute right-3 top-3 p-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-white/20 glass">
                    <div class="bg-slate-900 p-8 text-white">
                        <h1 class="text-3xl font-extrabold">Innova Proyectos</h1>
                        <p class="text-slate-400">SCR Seguimiento Centralizado por Regionales</p>
                    </div>

                    <form id="innovationForm" class="p-8 space-y-8">
                        <input type="hidden" id="recordId" value="">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">Regional / Sede *</label>
                                <select id="regional" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="">Seleccione...</option>
                                    <option value="Cibao Norte">Cibao Norte</option>
                                    <option value="Cibao Sur">Cibao Sur</option>
                                    <option value="Oriental">Oriental</option>
                                    <option value="Metropolitana">Metropolitana</option>
                                    <option value="Norte">Regional Norte</option>
                                    <option value="Sur">Regional Sur</option>
                                    <option value="Este">Regional Este</option>
                                    <option value="ECI">ECI</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">Taller Responsable *</label>
                                <select id="taller" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="">Seleccione Taller...</option>
                                    <option value="Electrónica">Electrónica</option>
                                    <option value="Informática">Informática</option>
                                    <option value="Mecánica">Mecánica</option>
                                    <option value="Mecánica Industrial">Mecánica Industrial</option>
                                    <option value="Gastronomía y Hotelería">Gastronomía y Hotelería</option>
                                    <option value="Ebanistería">Ebanistería</option>
                                    <option value="Salud y bienestar">Salud y bienestar</option>
                                    <option value="Artes Gráficas">Artes Gráficas</option>
                                    <option value="Electricidad">Electricidad</option>
                                    <option value="Confecion y diseño">Confeccion</option>
                                    <option value="Ebanisteria">Ebanisteria</option>
                                    <option value="Desabolladura y pintura">Desabolladura y pintura</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 p-6 bg-blue-50/50 rounded-2xl border border-blue-100">
                            <div>
                                <label class="block text-sm font-bold text-blue-800 mb-2">Fecha Último Seguimiento *</label>
                                <input type="date" id="fechaSeguimiento" required class="w-full bg-white border border-blue-200 rounded-xl p-4 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-blue-800 mb-2">Prioridad</label>
                                <div class="flex gap-2">
                                    <button type="button" onclick="setPriority('Baja')" class="priority-btn flex-1 py-4 rounded-xl border-2 border-slate-200 font-bold text-slate-500 bg-white text-xs hover:border-blue-300 transition-all">Baja</button>
                                    <button type="button" onclick="setPriority('Media')" class="priority-btn flex-1 py-4 rounded-xl border-2 border-slate-200 font-bold text-slate-500 bg-white text-xs hover:border-blue-300 transition-all">Media</button>
                                    <button type="button" onclick="setPriority('Alta')" class="priority-btn flex-1 py-4 rounded-xl border-2 border-slate-200 font-bold text-slate-500 bg-white text-xs hover:border-blue-300 transition-all">Alta</button>
                                </div>
                                <input type="hidden" id="prioridad" value="">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <input type="text" id="nombreProyecto" required placeholder="Nombre del Proyecto *" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4">
                            <input type="text" id="cedula" required placeholder="Cédula del Responsable *" class="w-full bg-blue-50 border-2 border-blue-100 rounded-xl p-4 font-bold text-blue-800">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <input type="text" id="responsable" required placeholder="Nombre Responsable" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4">
                            <input type="tel" id="telefono" required placeholder="Teléfono" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4">
                            <input type="email" id="email" required placeholder="Correo" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4">
                        </div>

                        <textarea id="recomendaciones" placeholder="Recomendaciones y Mejoras" rows="3" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4"></textarea>

                        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                            <div class="flex justify-between items-center mb-4">
                                <label class="font-bold text-slate-700">Estado de Avance</label>
                                <span id="progresoValor" class="bg-slate-900 text-white px-4 py-1 rounded-full text-sm font-bold">0%</span>
                            </div>
                            <input type="range" id="progreso" min="0" max="100" value="0" class="w-full h-3 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 pt-4">
                            <button type="button" onclick="resetForm()" class="py-4 px-6 rounded-xl font-bold text-blue-600 bg-blue-50">Nuevo Registro</button>
                            <button type="button" onclick="limpiarFormulario()" class="py-4 px-6 rounded-xl font-bold text-slate-600 bg-slate-100">Limpiar</button>
                            <button type="submit" id="btnGuardar" class="py-4 px-6 rounded-xl font-bold text-white bg-blue-600 shadow-xl">Guardar Registro</button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="fichas-view" class="hidden h-[calc(100vh-140px)] flex flex-col md:flex-row gap-4">
                <div class="flex-1 bg-white p-6 rounded-2xl shadow-lg border border-blue-100 flex flex-col">
                    <div id="grid-fichas" class="flex-1 overflow-y-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 content-start"></div>
                </div>
                <div class="md:w-1/4 w-full bg-slate-100 p-4 rounded-2xl border-2 border-dashed border-slate-300" id="zona-papelera" ondrop="drop(event, 'papelera')" ondragover="allowDrop(event)">
                    <div class="text-center mb-4">
                        <h4 class="font-bold text-slate-700">Papelera de Reciclaje</h4>
                        <div id="grid-papelera" class="mt-4"></div>
                    </div>
                </div>
            </div>

            <div id="dashboard-view" class="hidden space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="bg-white p-6 rounded-2xl shadow-lg border border-blue-100 text-center">
                        <p class="text-xs font-bold text-slate-500 uppercase">Total Proyectos</p>
                        <p id="stat-total" class="text-3xl font-extrabold text-blue-600">0</p>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-lg border border-blue-100 h-[350px]">
                        <canvas id="chartRegionales"></canvas>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-lg border border-blue-100 h-[350px]">
                        <canvas id="chartTalleres"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzMLSr8RG5yksGorBWK0biCrXHYQ4yqBwdFS3r8Bv3JrS4aNX-dqXruDCpk7z8r3z0/exec';
        let rolUsuarioActual = '';

        // --- LÓGICA DE LOGIN (EXACTAMENTE COMO EN TU ARCHIVO) ---
        function togglePasswordField() {
            const role = document.getElementById('user-role').value;
            const passField = document.getElementById('password-field');
            if (role === 'admin') {
                passField.classList.remove('hidden');
            } else {
                passField.classList.add('hidden');
                document.getElementById('login-pass').value = '';
            }
        }

        function intentarLogin() {
            const role = document.getElementById('user-role').value;
            const pass = document.getElementById('login-pass').value;
            if (role === 'admin') {
                if (pass === 'innovacion2026') {
                    entrarAlSistema('admin');
                } else {
                    alert("Contraseña incorrecta");
                }
            } else {
                entrarAlSistema('general');
            }
        }

        function entrarAlSistema(role) {
            rolUsuarioActual = role;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            if (role === 'general') {
                document.getElementById('tab-fichas').style.display = 'none';
                document.getElementById('tab-dashboard').style.display = 'none';
                document.getElementById('btn-logout').classList.add('hidden');
            } else {
                document.getElementById('tab-fichas').style.display = 'block';
                document.getElementById('tab-dashboard').style.display = 'block';
                document.getElementById('btn-logout').classList.remove('hidden');
            }
        }

        function logout() { location.reload(); }

        // --- ARREGLO DE LOS BOTONES DE PRIORIDAD ---
        function setPriority(level) {
            document.getElementById('prioridad').value = level;
            const buttons = document.querySelectorAll('.priority-btn');
            
            // Mapeo correcto a tus clases CSS
            const classMap = {
                'Baja': 'active-low',
                'Media': 'active-medium',
                'Alta': 'active-high'
            };

            buttons.forEach(btn => {
                // Quitamos el estado activo de todos
                btn.classList.remove('active-high', 'active-medium', 'active-low', 'text-white');
                
                // Aplicamos el color solo al botón seleccionado
                if (btn.innerText.trim() === level) {
                    btn.classList.add(classMap[level], 'text-white');
                }
            });
        }

        // --- NAVEGACIÓN Y RESTO DE FUNCIONES (INTACTAS) ---
        function switchTab(tab) {
            document.getElementById('registro-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('fichas-view').classList.add('hidden');
            document.getElementById(tab + '-view').classList.remove('hidden');
        }

        function limpiarFormulario() {
            document.getElementById('innovationForm').reset();
            document.getElementById('recordId').value = '';
            document.getElementById('progresoValor').textContent = "0%";
            setPriority(''); // Limpia los botones
        }

        function resetForm() { limpiarFormulario(); }

        // Mantenemos la lógica de progreso
        document.getElementById('progreso').oninput = function() {
            document.getElementById('progresoValor').textContent = this.value + '%';
        };

        // (Aquí iría el resto de tu lógica de Fetch, Charts y Drag&Drop intacta...)
    </script>
</body>
</html>
